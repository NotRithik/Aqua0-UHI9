[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
auto_detect_solc = true
ignored_warnings_from = ["lib/"]
fs_permissions = [{ access = "read", path = "./deployments" }]
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@uniswap/v4-core/=lib/v4-core/src/",
    "@uniswap/v4-periphery/=lib/v4-periphery/src/"
]

[rpc_endpoints]
unichain_sepolia = "https://unichain-sepolia-rpc.publicnode.com"
local = "http://localhost:8545"
